name: quality-gates

on:
  pull_request:
    paths:
      - ".github/workflows/quality-gates.yml"
      - "scripts/ci/**"
      - "SpliceGrapher/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Enforce clean-invariant ratchet
        run: uv run python scripts/ci/check_clean_invariant.py

      - name: Enforce interval overlap benchmark/parity gate
        run: |
          uv run python scripts/benchmarks/run_interval_overlap_benchmarks.py \
            --interval-count 1200 \
            --query-count 1200 \
            --iterations 2 \
            --assert-threshold \
            --max-slowdown-ratio 1.35 \
            --json-out /tmp/interval_overlap_benchmark_results.json \
            --markdown-out /tmp/interval_overlap_benchmark_results.md

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

      - name: Build package
        run: uv build
