minimum_pre_commit_version: "3.7.0"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (autofix)
        entry: uv run ruff check --fix
        language: system
        files: \.(py|pyi|ipynb)$
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        files: \.(py|pyi|ipynb)$
      - id: clean-invariant
        name: clean-invariant ratchet
        entry: uv run python scripts/ci/check_clean_invariant.py
        language: system
        pass_filenames: false
      - id: pytest-pre-push
        name: pytest (pre-push)
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: uv-build-pre-push
        name: uv build (pre-push)
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]
